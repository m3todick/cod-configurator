<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Регистрация — ЦОД Конфигуратор</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<style>
.password-group { position: relative; }
.password-indicator {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.password-indicator-bar {
  height: 100%;
  width: 0;
  background: #2563EB;
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}
.terms-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 4px 0 8px;
}
.terms-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin-top: 2px;
  accent-color: #2563EB;
  cursor: pointer;
  flex-shrink: 0;
}
.terms-row label {
  font-size: 0.82rem;
  color: var(--text-secondary);
  cursor: pointer;
  line-height: 1.5;
}
.terms-row a { color: #2563EB; text-decoration: underline; }
.login-page .form-label { color: rgba(255,255,255,0.55); font-weight: 500; }
.login-page .terms-row label { color: rgba(255,255,255,0.55); }
.login-page .terms-row a { color: #93C5FD; text-decoration: underline; }
.login-page #error-msg, .login-page #success-msg { color: inherit; }
.login-page a { color: rgba(255,255,255,0.55) !important; }
#register-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px;
  font-size: 1rem;
  background: var(--surface-alt);
  color: var(--text-muted);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  width: 100%;
  cursor: not-allowed;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
  font-weight: 600;
}
#register-btn.active {
  background: #2563EB;
  color: #fff;
  border-color: #2563EB;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="login-page">
  <div class="login-card fade-in">
    <div class="login-logo">
      <div class="icon">⚡</div>
      <h1>ЦОД Конфигуратор</h1>
      <p>Регистрация нового аккаунта</p>
    </div>

    <div id="error-msg" style="display:none;background:#FEE2E2;color:#DC2626;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:16px;"></div>
    <div id="success-msg" style="display:none;background:#D1FAE5;color:#065F46;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:16px;"></div>

    <div class="form-group">
      <label class="form-label">Имя и фамилия</label>
      <input type="text" id="name" class="form-control" placeholder="Иван Иванов" oninput="checkForm()">
    </div>
    <div class="form-group">
      <label class="form-label">Email адрес</label>
      <input type="email" id="email" class="form-control" placeholder="user@konst-adm.ru" oninput="checkForm()">
    </div>
    <div class="form-group password-group">
      <label class="form-label">Пароль</label>
      <input type="password" id="password" class="form-control" placeholder="Минимум 6 символов" oninput="updateIndicator(); checkForm();">
      <div class="password-indicator">
        <div class="password-indicator-bar" id="pwd-bar"></div>
      </div>
    </div>
    <div class="form-group password-group">
      <label class="form-label">Подтверждение пароля</label>
      <input type="password" id="confirm" class="form-control" placeholder="Повторите пароль" oninput="updateIndicator(); checkForm();">
      <div class="password-indicator">
        <div class="password-indicator-bar" id="confirm-bar"></div>
      </div>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="terms" onchange="checkForm()">
      <label for="terms">Я принимаю <a href="/terms" target="_blank" style="color:#93C5FD !important;text-decoration:underline;">условия использования</a> и <a href="/privacy" target="_blank" style="color:#93C5FD !important;text-decoration:underline;">политику конфиденциальности</a></label>
    </div>

    <button class="btn w-100" id="register-btn" onclick="doRegister()" disabled>
      Зарегистрироваться
    </button>

    <div style="text-align:center;margin-top:16px;">
      <a href="/login" style="font-size:0.82rem;color:var(--text-muted);">Уже есть аккаунт? Войти</a>
    </div>
    <div style="text-align:center;margin-top:8px;">
      <a href="/" style="font-size:0.82rem;color:var(--text-muted);">← Вернуться на главную</a>
    </div>
  </div>
</div>

<script src="/static/js/common.js"></script>
<script>
function updateIndicator() {
  const pwd = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  const bar = document.getElementById('pwd-bar');
  const cbar = document.getElementById('confirm-bar');

  const strength = Math.min(pwd.length / 12, 1);
  bar.style.width = (pwd.length > 0 ? Math.max(strength * 100, 15) : 0) + '%';

  if (conf.length > 0) {
    const match = pwd.startsWith(conf) || conf === pwd;
    cbar.style.width = (conf.length / Math.max(pwd.length, conf.length) * 100) + '%';
    cbar.style.background = conf === pwd ? '#10B981' : '#EF4444';
  } else {
    cbar.style.width = '0%';
    cbar.style.background = '#2563EB';
  }
}

function checkForm() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value;
  const conf = document.getElementById('confirm').value;
  const terms = document.getElementById('terms').checked;
  const btn = document.getElementById('register-btn');
  const allFilled = name && email && pwd.length >= 6 && pwd === conf && terms;
  btn.disabled = !allFilled;
  btn.classList.toggle('active', !!allFilled);
}

async function doRegister() {
  const btn = document.getElementById('register-btn');
  const errEl = document.getElementById('error-msg');
  const succEl = document.getElementById('success-msg');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('password').value;
  errEl.style.display = 'none';
  succEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Регистрация...';
  try {
    await http.post('/api/auth/register', { name, email, password: pwd });
    succEl.textContent = 'Аккаунт создан! Перенаправление...';
    succEl.style.display = 'block';
    setTimeout(() => window.location.href = '/login', 1500);
  } catch(e) {
    errEl.textContent = e.message || 'Ошибка регистрации';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Зарегистрироваться';
    checkForm();
  }
}
document.getElementById('confirm').addEventListener('keydown', e => { if(e.key==='Enter' && !document.getElementById('register-btn').disabled) doRegister(); });
</script>
</body>
</html>
