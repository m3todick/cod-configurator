<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — ЦОД Конфигуратор</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
  <div class="login-page">
    <div class="login-card fade-in">
      <div class="login-logo">
        <div class="icon">⚡</div>
        <h1>ЦОД Конфигуратор</h1>
        <p>Администрация Константиновского района</p>
      </div>

      <div id="error-msg"
        style="display:none;background:#FEE2E2;color:#DC2626;padding:10px 14px;border-radius:8px;font-size:0.875rem;margin-bottom:16px;">
      </div>

      <div class="form-group">
        <label class="form-label" style="color:rgba(255,255,255,0.55);">Email адрес</label>
        <input type="email" id="email" class="form-control" placeholder="Введите email">
      </div>
      <div class="form-group">
        <label class="form-label" style="color:rgba(255,255,255,0.55);">Пароль</label>
        <input type="password" id="password" class="form-control" placeholder="Введите пароль">
      </div>
      <button class="btn btn-primary w-100" style="padding:12px;font-size:1rem;" id="login-btn" onclick="doLogin()">
        Войти в систему
      </button>

      <!-- <div style="margin-top:20px;padding:14px;background:var(--surface-alt);border-radius:8px;border:1px solid var(--border);">
      <div style="font-size:0.78rem;font-weight:700;margin-bottom:6px;color:var(--text-muted);">Демо-доступ:</div>
      <div style="font-size:0.78rem;color:var(--text-secondary);">
        👤 <strong>Администратор:</strong> admin@konst-adm.ru / admin123<br>
        👤 <strong>Пользователь:</strong> user@konst-adm.ru / user123
      </div>
    </div> -->

      <div style="text-align:center;margin-top:16px;">
        <a href="/register" style="font-size:0.82rem;color:#2563EB;">Нет аккаунта? Зарегистрироваться</a>
      </div>
      <div style="text-align:center;margin-top:8px;">
        <a href="/" style="font-size:0.82rem;color:var(--text-muted);">← Вернуться на главную</a>
      </div>
    </div>
  </div>

  <script src="/static/js/common.js"></script>
  <script>
    async function doLogin() {
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('error-msg');
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value;
      errEl.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Вход...';
      try {
        await http.post('/api/auth/login', { email, password: pwd });
        window.location.href = '/cabinet';
      } catch (e) {
        errEl.textContent = e.message || 'Неверные данные';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Войти в систему';
      }
    }
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>

</html>
